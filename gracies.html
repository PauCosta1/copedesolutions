<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gràcies</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" type="image/png"  sizes="128x128" href="image-removebg-preview.png" hei>
  <style>
    :root {
      --neon: #00d4ff;
      --neon-glow: rgba(0, 212, 255, 0.35);
      --bg-deep: #030712;
      --bg-card: #0d1117;
      --grid-line: rgba(0, 212, 255, 0.06);
      --text-muted: #6b7fa3;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Syne', sans-serif;
      background-color: var(--bg-deep);
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow-x: hidden;
    }

    /* Fons grid igual que la web principal */
    .bg-grid {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image:
        linear-gradient(var(--grid-line) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    .bg-glow {
      position: fixed;
      top: -200px;
      left: -200px;
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(0,212,255,0.08) 0%, transparent 70%);
      z-index: 0;
      pointer-events: none;
      animation: drift 18s ease-in-out infinite alternate;
    }

    @keyframes drift {
      from { transform: translate(0,0); }
      to { transform: translate(80px, 60px); }
    }

    /* Container principal */
    .gracias-container {
      position: relative;
      z-index: 1;
      max-width: 600px;
      width: 90%;
      margin: 2rem auto;
      animation: fadeInUp 0.6s ease-out;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Targeta principal */
    .gracias-card {
      background: var(--bg-card);
      border: 1px solid rgba(0, 212, 255, 0.15);
      border-radius: 24px;
      padding: 3rem 2rem;
      text-align: center;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(0, 212, 255, 0.08), 0 40px 80px rgba(0, 0, 0, 0.6);
    }

    .gracias-card::before {
      content: '';
      position: absolute;
      top: -1px;
      left: 20%;
      right: 20%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--neon), transparent);
    }

    .gracias-card::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 400px;
      height: 200px;
      background: radial-gradient(ellipse, rgba(0,212,255,0.05) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Logo gran */
    .logo-wrapper {
      margin-bottom: 2rem;
      position: relative;
      z-index: 1;
    }

    .logo-large {
      width: 140px;
      height: 140px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 212, 255, 0.05);
      border-radius: 30px;
      border: 1px solid rgba(0, 212, 255, 0.2);
      box-shadow: 0 0 40px rgba(0, 212, 255, 0.15);
      animation: logoPulse 2s ease-in-out infinite;
    }

    .logo-large img {
      width: 110px;
      height: 110px;
      object-fit: contain;
      mix-blend-mode: screen;
    }

    @keyframes logoPulse {
      0%, 100% {
        box-shadow: 0 0 40px rgba(0, 212, 255, 0.15);
        border-color: rgba(0, 212, 255, 0.2);
      }
      50% {
        box-shadow: 0 0 60px rgba(0, 212, 255, 0.3);
        border-color: rgba(0, 212, 255, 0.5);
      }
    }

    /* Icona de verificació */
    .check-icon {
      width: 70px;
      height: 70px;
      margin: 0 auto 1.5rem;
      border: 2px solid var(--neon);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: checkPulse 0.5s ease-out;
      background: rgba(0, 212, 255, 0.05);
    }

    .check-icon svg {
      width: 38px;
      height: 38px;
      stroke: var(--neon);
      stroke-width: 2.5;
    }

    @keyframes checkPulse {
      0% {
        transform: scale(0);
        opacity: 0;
      }
      80% {
        transform: scale(1.1);
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    /* TÍTOL MÉS GRAN I MÉS BONIC */
    .neon-title {
      display: block;
      font-size: 30px;
      font-weight: 800;
      margin-bottom: 1.5rem;
      color: #ffffff;
      text-shadow: 0 0 20px var(--neon-glow), 0 0 40px rgba(0,212,255,0.3);
      letter-spacing: -0.02em;
      line-height: 1.2;
      animation: titleGlow 2s ease-in-out infinite;
    }

    @keyframes titleGlow {
      0%, 100% {
        text-shadow: 0 0 20px var(--neon-glow), 0 0 40px rgba(0,212,255,0.3);
      }
      50% {
        text-shadow: 0 0 35px var(--neon-glow), 0 0 60px rgba(0,212,255,0.5);
      }
    }

    /* Missatge */
    .message {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      line-height: 1.7;
      color: var(--text-muted);
      margin-bottom: 2rem;
      position: relative;
      z-index: 1;
    }

    .message strong {
      color: var(--neon);
      font-weight: 600;
    }

    /* Enllaç botó */
    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 0.9rem 2rem;
      background: transparent;
      border: 1px solid var(--neon);
      border-radius: 8px;
      color: var(--neon);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      font-weight: 600;
      text-decoration: none;
      letter-spacing: 0.08em;
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
      cursor: pointer;
      z-index: 1;
    }

    .btn-back::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--neon);
      transform: translateX(-105%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: -1;
    }

    .btn-back:hover::before {
      transform: translateX(0);
    }

    .btn-back:hover {
      color: var(--bg-deep);
      box-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
    }

    .btn-back svg {
      transition: transform 0.2s ease;
    }

    .btn-back:hover svg {
      transform: translateX(-3px);
    }

    /* Text de redirecció */
    .redirect-text {
      margin-top: 2rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: #4b6080;
      position: relative;
      z-index: 1;
    }

    .redirect-text span {
      color: var(--neon);
      font-weight: 600;
    }

    /* Responsive */
    @media (max-width: 640px) {
      .gracias-card {
        padding: 2rem 1.5rem;
      }
      
      .logo-large {
        width: 100px;
        height: 100px;
      }
      
      .logo-large img {
        width: 80px;
        height: 80px;
      }
      
      .check-icon {
        width: 55px;
        height: 55px;
      }
      
      .check-icon svg {
        width: 28px;
        height: 28px;
      }
      
      .neon-title {
        font-size: clamp(1.8rem, 6vw, 2.8rem);
      }
      
      .message {
        font-size: 0.8rem;
      }
      
      .btn-back {
        padding: 0.75rem 1.5rem;
        font-size: 0.75rem;
      }
    }

    @media (max-width: 480px) {
      .gracias-card {
        padding: 1.75rem 1.25rem;
      }
      
      .logo-large {
        width: 80px;
        height: 80px;
      }
      
      .logo-large img {
        width: 65px;
        height: 65px;
      }
      
      .neon-title {
        font-size: clamp(1.5rem, 5vw, 2.2rem);
      }
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <div class="gracias-container">
    <div class="gracias-card">
      
      <!-- Logo gran de l'empresa -->
      <div class="logo-wrapper">
        <div class="logo-large">
          <img src="image-removebg-preview.png" alt="CoPeDe Solutions Logo">
        </div>
      </div>

      <!-- Icona de verificació -->
      <div class="check-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
      </div>

      <!-- Títol MÉS GRAN I MÉS BONIC -->
      <span class="neon-title">
        Gràcies per<br>contactar-nos!
      </span>

      <!-- Missatge d'agraïment -->
      <div class="message">
        Hem rebut correctament el teu missatge.<br>
        L'equip de <strong>CoPeDe Solutions</strong> et respondrà<br>
        en menys de <strong>24 hores</strong>.
      </div>

      <!-- Botó per tornar a la web inicial -->
      <a href="https://copede.ct.ws" class="btn-back">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M10 12L6 8L10 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Tornar a l'inici</span>
      </a>
    </div>
  </div>
</body>
</html>
